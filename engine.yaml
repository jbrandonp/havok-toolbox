# HAVOK Engine Configuration
# Run with: havok engine start --config engine.yaml

streams:
  - id: lorenz_demo
    source: synthetic://lorenz
    buffer_seconds: 300
    havok:
      m: 50
      tau: 1
      r: 5
      threshold_std: 3.0
      window: 100
    alerts:
      - condition: "risk > 0.7"
        level: warning
        cooldown: 60
        targets: [stdout]

  - id: eeg_channel
    source: synthetic://eeg
    buffer_seconds: 180
    sample_rate: 256
    havok:
      m: 30
      tau: 5
      r: 5
      threshold_std: 3.0
      window: 256
    alerts:
      - condition: "risk > 0.5 AND surge > 0.6"
        level: critical
        cooldown: 30
        targets: [stdout]

